services:
  mysql:
    image: mysql:5.7
    restart: always
    ports:
      - "8081:3306"
    environment:
      MYSQL_USER: wordpress
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: wordpress
      MYSQL_PASSWORD: "1234"
    volumes:
      - mysql_data:/var/lib/mysql

  wordpress:
    depends_on:
      - mysql
    image: wordpress:latest
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: "1234"
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./wp_content:/var/www/html/wp-content/themes

  git-helper:
    image: alpine/git
    volumes:
      - ./wp_content:/repo
    working_dir: /repo
    entrypoint: |
      sh -c "
      git config --global --add safe.directory /repo
      if [ ! -d '.git' ]; then
        echo 'descargando repo'
        git clone https://github.com/goatythegoat/Repo-desarrollo-WebFusion-Digital-S.L.git .
      else
        echo 'actualizando repo'
        git pull origin main
      fi
      if [ -f './repo-temp/index.php' ]; then
        echo 'aplicando parche index.php'
        cp ./repo-temp/index.php ./index.php
      fi
      echo 'sincronizacion exitosa'
      "

volumes:
  mysql_data:
